{{- /* Enable math rendering in Hugo pages via MathJax. */ -}}
<script>
  window.MathJax = {
    tex: {
      inlineMath: [["\\(", "\\)"]],
      displayMath: [["$$", "$$"]],
      processEscapes: true,
    },
    svg: { fontCache: "global" },
  };
</script>
<script
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"
  defer
></script>
