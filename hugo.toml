baseURL = "https://vassily60.github.io/"
languageCode = "en-us"
title = "Vassily Lombard"
theme = "PaperMod"
relativeURLs = false
canonifyURLs = false

[pagination]
  pagerSize = 8

[params]
  author = "Vassily Lombard"
  description = "A blog about science, curiosity, and the ideas that matter."
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  mainSections = ["posts"]
  TocOpen = false
  disableScrollToTop = false
  comments = false

  [params.homeInfoParams]
    Title = "Welcome to my blog ! 👋"
    Content = "I am Vassily, a student at Columbia University, and I share on this blog a little bit about my passions. From coding to building robots and writing reviews about books I read, you will learn a bit more about me in this blog. Enjoy exploring !"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/vassily60"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 20

  [[menu.main]]
    identifier = "readings"
    name = "Readings"
    url = "/readings/"
    weight = 30

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
